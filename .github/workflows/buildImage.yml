name: Build container image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        required: true
      version:
        description: Full or Slim version ('0' == Full, '1' == slim)
        type: choice
        options:
          - '0'
          - '1'
        required: true
        default: '1'

jobs:

  build:
    runs-on: Ubuntu-latest

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: update yaml file with env variables
        uses: cschleiden/replace-tokens@v1
        with:
          tokenPrefix: '#{'
          tokenSuffix: '}#'
          files: '["./customize/web/src/pages/login/index.tsx"]'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          HOST: ${{ secrets.HOST }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: python -m pip install --upgrade huggingface_hub nltk
            
      - name: Download dependency
        run: |
          if [ ${{ inputs.version }} == "0" ]; then
            python ./download_deps.py
          elif [ ${{ inputs.version }} == "1" ]; then
            python ./customize/download_deps.py
          fi

      - name: 'Login ACR'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USER }}
          password: ${{ secrets.ACR_TOKEN }}

      - name: Build and push image to Azure ACR
        run: |
          if [ ${{ inputs.version }} == "0" ]; then
            docker build --file ./customize/Dockerfile --tag acraksys64gn2f5izuw.azurecr.io/ragflow:${{ inputs.tag }} .
            docker push acraksys64gn2f5izuw.azurecr.io/ragflow:${{ inputs.tag }}
          elif [ ${{ inputs.version }} == "1" ]; then
            docker build --build-arg LIGHTEN=1 --file ./customize/Dockerfile --tag acraksys64gn2f5izuw.azurecr.io/ragflow:slim_${{ inputs.tag }} .
            docker push acraksys64gn2f5izuw.azurecr.io/ragflow:slim_${{ inputs.tag }}
          fi
          